# Minimal CI: backend tests (against a fresh migrations+seed Postgres),
# frontend lint+build, and a tracked-secret grep gate.
#
# The backend job reproduces the local recipe validated on 2026-06-12:
#   postgres:16-alpine → apply server/db/migrations/*.sql in order →
#   apply server/db/ci-seed.sql → DATABASE_URL=... jest   (226/226)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fin
          POSTGRES_PASSWORD: ci-test-only
          POSTGRES_DB: fin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fin -d fin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://fin:ci-test-only@localhost:5432/fin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Apply migrations + CI seed
        env:
          PGPASSWORD: ci-test-only
        run: |
          for f in server/db/migrations/*.sql; do
            echo "applying $f"
            psql -h localhost -U fin -d fin -q -v ON_ERROR_STOP=1 -f "$f"
          done
          psql -h localhost -U fin -d fin -q -v ON_ERROR_STOP=1 -f server/db/ci-seed.sql
      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Run backend tests
        working-directory: server
        run: npx jest --ci

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Lint (BLOCKING — CR043 3.4)
        # Advisory since 2026-06-12 (160 errors then). Errors are now ZERO, so it blocks.
        #
        # Everything that catches a real BUG is an error: no-undef, no-unused-vars,
        # react-hooks/rules-of-hooks, react-hooks/refs, react-hooks/immutability, and the
        # toISOString guard. That set earned the gate: a scripted dead-variable pass in
        # v3.0.96 produced VALID JavaScript that passed the build AND all 179 tests but
        # would have thrown ReferenceError on import — only no-undef caught it.
        #
        # Two rules are warnings instead, because they are debt rather than breakage
        # (set-state-in-effect, react-refresh/only-export-components — see eslint.config.js).
        # They are not unbounded: the next step baselines them, and the count may only shrink.
        working-directory: frontend
        run: npm run lint
      - name: Lint-debt ratchet (blocking)
        # "It's only a warning" is how a count grows back. Fails if either warned-rule count
        # rises above its baseline.
        working-directory: frontend
        run: npm run lint:debt
      - name: API-envelope ratchet (blocking)
        # CR043 N8: the v2 API has two success conventions ({data} vs bare). Callers must
        # know which, and guessing wrong renders an EMPTY page with no error — that is how
        # the Modify Transfer modal broke (v3.0.98). No NEW bare endpoints; the count may
        # only shrink.
        working-directory: frontend
        run: npm run lint:envelope
      - name: Design-primitive adoption guards (blocking)
        # CR042: fail if a NEW one-off button class, bespoke role="dialog" overlay,
        # or naked-hex inline style is introduced instead of the shared .btn /
        # <Modal> primitives / a theme token — and if any var(--x) references a
        # token that is never defined (it silently falls back and ignores the theme;
        # there were 63 such dangling refs). The first three keep a baseline under
        # Scripts/ that may only shrink; lint:tokens has none — the bar is zero.
        working-directory: frontend
        run: |
          npm run lint:buttons
          npm run lint:modals
          npm run lint:hex
          npm run lint:tokens
      - name: Unit tests (Vitest)
        # Blocking: the 121-test frontend suite must stay green (CR043 N1 —
        # previously these ran only by hand, so a PR could break all of them
        # and merge). vitest run is non-watch/CI-safe by default.
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block known tokens and tracked env files
        run: |
          set -e
          fail=0
          # Real leaked key prefixes — banned EVERYWHERE (rotated 2026-06-12,
          # but they must never reappear in tracked content). This workflow
          # file is excluded: it necessarily names the patterns it bans.
          SELF=':!.github/workflows/ci.yml'
          if git grep -nIE '4d7decce5643|c785b47906e3|7916e6eba6fa' -- . "$SELF"; then
            echo '::error::leaked API key material found in tracked files'; fail=1
          fi
          # Retired default DB password — banned outside docs/
          # (historical CR text legitimately names the token).
          if git grep -nI 'findev123' -- . ':!docs/' "$SELF"; then
            echo '::error::findev123 found outside docs/'; fail=1
          fi
          # Env files must never be tracked (templates *.example are fine).
          tracked=$(git ls-files | grep -E '(^|/)\.env$|(^|/)\.env-cmdrc$' || true)
          if [ -n "$tracked" ]; then
            echo "::error::env files tracked in git: $tracked"; fail=1
          fi
          exit $fail
