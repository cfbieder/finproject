# Development Docker Compose Configuration
# Runs alongside production with different ports

services:
  fin-postgres-dev:
    image: postgres:16-alpine
    container_name: fin-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: fin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — copy .env.example to .env}
      POSTGRES_DB: fin
    ports:
      # localhost + Tailscale only — never the LAN (dev port; prod uses 5433)
      - "127.0.0.1:5434:5432"
      - "100.94.46.62:5434:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./server/db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - fin-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin -d fin"]
      interval: 10s
      timeout: 5s
      retries: 5

  server-dev:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fin-server-dev
    restart: unless-stopped
    ports:
      - "3105:3005"  # Dev port (production uses 3005)
    environment:
      NODE_ENV: development
      PORT: 3005
      DATABASE_URL: postgres://fin:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — copy .env.example to .env}@fin-postgres-dev:5432/fin
      ACCOUNT_NAMES_PATH: /app/components/data/account_names.json
      CATEGORY_NAMES_PATH: /app/components/data/category_names.json
      COA_PATH: /app/components/data/coa.json
      LLM_GATEWAY_URL: "${LLM_GATEWAY_URL:-http://192.168.1.61:8080}"
      BANK_FEED_URL: "${BANK_FEED_URL:-http://host.docker.internal:3007}"
      BANK_FEED_API_KEY: "${BANK_FEED_API_KEY:-}"
    extra_hosts:
      # Lets the container reach bank-feed at the host's published 3007 port
      # via host.docker.internal on Linux (Docker Desktop sets this up auto).
      - "host.docker.internal:host-gateway"
    volumes:
      - ./components/data:/app/components/data
      - ./components/reports:/app/components/reports
    networks:
      - fin-network-dev
    depends_on:
      fin-postgres-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3005/api/v2/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  fin-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
