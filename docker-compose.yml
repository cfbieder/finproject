services:
  # PostgreSQL - Primary database
  fin-postgres:
    image: postgres:16-alpine
    container_name: fin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-findev123}
      POSTGRES_DB: fin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - fin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin -d fin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fin-server
    restart: unless-stopped
    depends_on:
      fin-postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgres://fin:${POSTGRES_PASSWORD:-findev123}@fin-postgres:5432/fin
      ACCOUNT_NAMES_PATH: ../../components/data/account_names.json
      CATEGORY_NAMES_PATH: ../../components/data/category_names.json
      COA_PATH: ../../components/data/coa.json
      PS_API_KEY: ${PS_API_KEY:-4d7decce564383ec2fd44f7a0ce668d4949e2fac864de880e081dcb4c246740481774c17b60a63a6f1062d22e4cf7b77098253291545bab106d20c0f5d90a3a3}
      PS_USER_ID: ${PS_USER_ID:-330430}
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-http://192.168.1.61:8080}
      BANK_FEED_URL: ${BANK_FEED_URL:-http://host.docker.internal:3007}
      BANK_FEED_API_KEY: ${BANK_FEED_API_KEY:-}
    extra_hosts:
      # Lets the container reach bank-feed at the host's published 3007 port
      # via host.docker.internal on Linux (CR021 Phase 7).
      - "host.docker.internal:host-gateway"
    ports:
      - "3005:3005"
    volumes:
      - ./components/data:/app/components/data
      - ./components/reports:/app/components/reports
      - ./mongo_backups:/data/mongo_backups
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - fin-network

  # Frontend (PostgreSQL/v2 API)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_APP_VERSION: ${VITE_APP_VERSION:-2.0.0}
        VITE_APP_MODE: prod
        VITE_APP_API: ""
        VITE_NAV_LAYOUT: sidebar
    container_name: fin-frontend
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3006:80"
      - "5175:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - fin-network

networks:
  fin-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
