# New Frontend - PostgreSQL/v2 API
# Serves on port 3006/5175
# Rewrites legacy API calls to v2 PostgreSQL routes

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name localhost 192.168.1.87 _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name localhost 192.168.1.87 _;
    root /usr/share/nginx/html;
    index index.html;

    # Increase max upload size for CSV imports
    client_max_body_size 50m;

    # SSL certificate files
    ssl_certificate /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Add header to identify this as the new frontend
    add_header X-Frontend-Version "new-postgresql" always;

    # Service worker + manifest must always be revalidated
    # (browsers check sw.js on every navigation; stale = no updates)
    location ~ ^/(sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache";
    }

    # Hashed Vite assets — immutable forever (new build = new filename)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static assets (icons, fonts) — cache with revalidation
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # =========================================================================
    # V2 API Rewrites (Legacy → PostgreSQL)
    # =========================================================================

    # AI Review — heavy LLM can take up to ~5min on cold start
    location /api/v2/ai-review/ {
        proxy_pass http://server:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
        proxy_connect_timeout 30s;
        proxy_buffering off;
    }

    # Already v2 calls - pass through directly
    location /api/v2/ {
        proxy_pass http://server:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Rewrite: /api/balance → /api/v2/reports/balance
    location /api/balance {
        rewrite ^/api/balance(.*)$ /api/v2/reports/balance$1 break;
        proxy_pass http://server:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rewrite: /api/cash-flow → /api/v2/reports/cash-flow
    location /api/cash-flow {
        rewrite ^/api/cash-flow(.*)$ /api/v2/reports/cash-flow$1 break;
        proxy_pass http://server:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rewrite: /api/budget → /api/v2/budget
    location /api/budget {
        rewrite ^/api/budget(.*)$ /api/v2/budget$1 break;
        proxy_pass http://server:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rewrite: /api/forecast → /api/v2/forecast
    location /api/forecast {
        rewrite ^/api/forecast(.*)$ /api/v2/forecast$1 break;
        proxy_pass http://server:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback: Other /api/* calls go to legacy routes (for routes not yet migrated)
    location /api/ {
        proxy_pass http://server:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve index.html for all routes (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Custom error pages
    error_page 404 /index.html;
}
