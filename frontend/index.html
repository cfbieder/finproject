<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192-v2.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180-v2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FDFCF8" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Fin" />
    <meta name="description" content="Personal finance management and forecasting" />
    <!-- Outfit, self-hosted (CR042). Was the Google Fonts CDN: a third-party request on
         every load, no font at all when the PWA ran offline, and a FOUT. Outfit v15 is a
         variable font, so all five weights come from these two files (~47KB). Preloading
         the latin file kills the swap flash for everything but extended glyphs. -->
    <link
      rel="preload"
      href="/fonts/outfit-QGYvz_MVcBeNP4NJtEtq.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="/fonts/outfit.css" />
    <title>FI</title>
    <script>
      /* CR026 P2 — apply saved theme before paint to avoid a flash.
         Defaults to light (kept in sync by hooks/useTheme.js). */
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
